name: Artifact manifest validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  artifact-manifest-validation:
    name: Artifact manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r .github/governance/requirements.txt
      - run: python .github/governance/validate_artifact_manifests.py

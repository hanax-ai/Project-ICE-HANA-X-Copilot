name: Materialize ICE-ARCH-001 intake

on:
  push:
    branches:
      - author/ice-src-008-architecture-v0-1

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct and apply architecture overlay
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ice-arch
          cat .github/materialization/ice-arch-001/part-* > /tmp/ice-arch/overlay.tar.gz.b64
          base64 --decode /tmp/ice-arch/overlay.tar.gz.b64 > /tmp/ice-arch/overlay.tar.gz
          echo "032009e88916b093ee78f16b14ca0475937272f0fe651c234dcef07337427ab6  /tmp/ice-arch/overlay.tar.gz" | sha256sum -c -
          tar -xzf /tmp/ice-arch/overlay.tar.gz -C .
          rm -rf .github/materialization/ice-arch-001
          rm -f .github/workflows/materialize-ice-arch-001.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(architecture): add ICE-ARCH-001 solution architecture intake"
          git push origin "HEAD:${GITHUB_REF_NAME}"

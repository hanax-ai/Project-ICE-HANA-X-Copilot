name: Materialize ICE-ARCH-001 intake

on:
  push:
    branches:
      - author/ice-src-008-architecture-v0-1
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}
      - name: Reconstruct and apply architecture overlay
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ice-arch
          parts=(
            .github/materialization/ice-arch-001/part-000
            .github/materialization/ice-arch-001/part-001
            .github/materialization/ice-arch-001/part-002
            .github/materialization/ice-arch-001/part-003
            .github/materialization/ice-arch-001/part-0040
            .github/materialization/ice-arch-001/part-00410
            .github/materialization/ice-arch-001/part-00411
            .github/materialization/ice-arch-001/part-00420
            .github/materialization/ice-arch-001/part-004210
            .github/materialization/ice-arch-001/part-004211
            .github/materialization/ice-arch-001/part-004212
            .github/materialization/ice-arch-001/part-004213
            .github/materialization/ice-arch-001/part-004214
            .github/materialization/ice-arch-001/part-00430
            .github/materialization/ice-arch-001/part-00431
            .github/materialization/ice-arch-001/part-005
          )
          cat "${parts[@]}" > /tmp/ice-arch/overlay.tar.gz.b64
          base64 --decode /tmp/ice-arch/overlay.tar.gz.b64 > /tmp/ice-arch/overlay.tar.gz
          echo "032009e88916b093ee78f16b14ca0475937272f0fe651c234dcef07337427ab6  /tmp/ice-arch/overlay.tar.gz" | sha256sum -c -
          tar -xzf /tmp/ice-arch/overlay.tar.gz -C .
          rm -rf .github/materialization/ice-arch-001
          rm -f .github/workflows/materialize-ice-arch-001.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(architecture): add ICE-ARCH-001 solution architecture intake"
          git push origin "HEAD:${TARGET_BRANCH}"

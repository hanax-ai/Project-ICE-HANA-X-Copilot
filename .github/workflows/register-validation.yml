name: Register validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  register-validation:
    name: Register validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python .github/governance/validate_registers.py

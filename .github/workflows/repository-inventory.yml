name: Repository inventory

on:
  push:
    branches:
      - working
    paths-ignore:
      - REPOSITORY_INVENTORY.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: project-ice-repository-inventory
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh repository inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: working
          fetch-depth: 0
      - name: Generate tracked-file inventory
        shell: bash
        run: |
          set -euo pipefail
          git ls-files | LC_ALL=C sort > REPOSITORY_INVENTORY.txt
      - name: Commit inventory when changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- REPOSITORY_INVENTORY.txt; then
            echo "Repository inventory is current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPOSITORY_INVENTORY.txt
          git commit -m "chore(repository): refresh tracked-file inventory"
          git push origin HEAD:working

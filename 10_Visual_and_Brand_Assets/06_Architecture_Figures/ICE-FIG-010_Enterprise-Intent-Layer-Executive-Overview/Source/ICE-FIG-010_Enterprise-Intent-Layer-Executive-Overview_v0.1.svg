<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">HANA-X Copilot Enterprise Intent Layer executive overview</title>
  <desc id="desc">A business user states a natural-language intent. HANA-X Copilot interprets and clarifies the request, retrieves authorized context, creates an explainable plan, applies policy and approval, validates the payload, invokes a registered tool through a released interface, and returns an auditable SAP S/4HANA outcome.</desc>
  <defs>
    <linearGradient id="banner" x1="0" x2="1"><stop offset="0" stop-color="#062a66"/><stop offset="0.68" stop-color="#00a6a6"/><stop offset="1" stop-color="#f3a34a"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#073b7a"/><stop offset="1" stop-color="#009a9c"/></linearGradient>
    <linearGradient id="soft" x1="0" x2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#fdf2ea"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity="0.18"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#164e7a"/></marker>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#111827}.w{font-family:Arial,Helvetica,sans-serif;fill:white}.h1{font-size:43px;font-weight:700}.h2{font-size:27px;font-weight:700}.h3{font-size:22px;font-weight:700}.b{font-size:19px}.s{font-size:16px}.label{font-size:18px;font-weight:700;fill:#123d64}.box{stroke:#1b5b8e;stroke-width:2.2}.arrow{stroke:#164e7a;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="45" y="58" class="t h1">HANA-X Copilot: Enterprise Intent Layer for SAP S/4HANA</text>
  <text x="47" y="94" class="t h2" font-weight="400">Executive Summary</text>

  <rect x="190" y="118" width="1220" height="120" rx="18" fill="url(#banner)" stroke="#134f7d" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="245" cy="166" r="25" fill="#d8ddff" stroke="#0b2a52" stroke-width="2"/>
  <path d="M207 218 Q245 178 283 218 L283 226 L207 226 Z" fill="#d8ddff" stroke="#0b2a52" stroke-width="2"/>
  <text x="800" y="151" text-anchor="middle" class="w h2">Business User</text>
  <rect x="330" y="164" width="1015" height="54" rx="12" fill="#ffffff" stroke="#7aa0d6" stroke-width="3"/>
  <text x="350" y="198" class="t b">Natural-language intent: “Secure material for production before the shortage affects the schedule.”</text>

  <text x="790" y="275" text-anchor="middle" class="t h2">HANA-X COPILOT <tspan font-weight="400">(Enterprise Intent Layer)</tspan></text>
  <rect x="185" y="292" width="1140" height="500" rx="18" fill="url(#soft)" stroke="#1b5b8e" stroke-width="3"/>
  <text x="1250" y="326" text-anchor="end" class="t s" font-style="italic">Clean Core-aligned execution boundary</text>

  <rect x="225" y="350" width="250" height="150" rx="14" fill="url(#panel)" class="box" filter="url(#shadow)"/>
  <text x="350" y="392" text-anchor="middle" class="w h3">Interpret Intent</text>
  <text x="350" y="425" text-anchor="middle" class="w b">Identify outcome, entities,</text>
  <text x="350" y="452" text-anchor="middle" class="w b">constraints, and risk</text>

  <rect x="520" y="350" width="245" height="150" rx="14" fill="#fff1df" class="box" filter="url(#shadow)"/>
  <text x="642" y="392" text-anchor="middle" class="t h3">Clarify</text>
  <text x="642" y="425" text-anchor="middle" class="t b">Resolve ambiguity with</text>
  <text x="642" y="452" text-anchor="middle" class="t b">contextual questions</text>

  <rect x="810" y="330" width="290" height="84" rx="14" fill="url(#panel)" class="box" filter="url(#shadow)"/>
  <text x="955" y="365" text-anchor="middle" class="w h3">Retrieve Context</text>
  <text x="955" y="392" text-anchor="middle" class="w s">SAP • policy • organization • user</text>

  <rect x="810" y="432" width="290" height="84" rx="14" fill="url(#panel)" class="box" filter="url(#shadow)"/>
  <text x="955" y="466" text-anchor="middle" class="w h3">Generate Explainable Plan</text>
  <text x="955" y="493" text-anchor="middle" class="w s">Proposed actions, impact, and approval</text>

  <rect x="225" y="575" width="250" height="145" rx="14" fill="url(#panel)" class="box" filter="url(#shadow)"/>
  <text x="350" y="615" text-anchor="middle" class="w h3">Policy &amp; Approval</text>
  <text x="350" y="648" text-anchor="middle" class="w b">Identity, authority, rules,</text>
  <text x="350" y="675" text-anchor="middle" class="w b">thresholds, human approval</text>

  <rect x="520" y="575" width="245" height="145" rx="14" fill="url(#panel)" class="box" filter="url(#shadow)"/>
  <text x="642" y="615" text-anchor="middle" class="w h3">Validate Payload</text>
  <text x="642" y="648" text-anchor="middle" class="w b">Schema, metadata,</text>
  <text x="642" y="675" text-anchor="middle" class="w b">business-rule checks</text>

  <rect x="830" y="575" width="245" height="145" rx="14" fill="url(#panel)" class="box" filter="url(#shadow)"/>
  <text x="952" y="615" text-anchor="middle" class="w h3">Invoke Registered Tool</text>
  <text x="952" y="648" text-anchor="middle" class="w b">Released SAP interface</text>
  <text x="952" y="675" text-anchor="middle" class="w b">under initiating identity</text>

  <rect x="1160" y="430" width="365" height="270" rx="18" fill="#eef2ff" stroke="#325c9b" stroke-width="3" filter="url(#shadow)"/>
  <text x="1342" y="475" text-anchor="middle" class="t h2">SAP S/4HANA</text>
  <text x="1342" y="506" text-anchor="middle" class="t b">System of Record</text>
  <g fill="#dce8ff" stroke="#325c9b" stroke-width="2">
    <rect x="1205" y="545" width="120" height="55" rx="10"/><rect x="1360" y="545" width="120" height="55" rx="10"/>
    <rect x="1205" y="620" width="120" height="55" rx="10"/><rect x="1360" y="620" width="120" height="55" rx="10"/>
  </g>
  <text x="1265" y="580" text-anchor="middle" class="t s">Materials</text>
  <text x="1420" y="580" text-anchor="middle" class="t s">Purchase Orders</text>
  <text x="1265" y="655" text-anchor="middle" class="t s">Finance</text>
  <text x="1420" y="655" text-anchor="middle" class="t s">Manufacturing</text>
  <text x="1342" y="688" text-anchor="middle" class="t s">Authorized, auditable transactions</text>

  <path d="M800 238 L800 320" class="arrow"/><text x="820" y="285" class="label">1. State intent</text>
  <path d="M475 425 L510 425" class="arrow"/>
  <path d="M765 410 L800 380" class="arrow"/>
  <path d="M765 445 L800 474" class="arrow"/>
  <path d="M955 516 L955 555 L642 555 L642 565" class="arrow"/>
  <text x="480" y="545" class="label">2. Validate &amp; authorize</text>
  <path d="M765 648 L820 648" class="arrow"/><text x="775" y="625" class="label">3. Governed execution</text>
  <path d="M1075 648 L1148 648" class="arrow"/><text x="1090" y="625" class="label">4. Transactional outcome</text>
  <path d="M1342 430 L1342 260 L130 260 L130 180 L185 180" class="arrow"/>
  <text x="140" y="285" class="label">5. Status and evidence</text>

  <rect x="35" y="410" width="125" height="160" rx="14" fill="#f7fafc" stroke="#66788a" stroke-width="2"/>
  <text x="98" y="450" text-anchor="middle" class="t s" font-weight="700">Customer-</text>
  <text x="98" y="474" text-anchor="middle" class="t s" font-weight="700">controlled</text>
  <text x="98" y="498" text-anchor="middle" class="t s" font-weight="700">deployment</text>
  <text x="98" y="522" text-anchor="middle" class="t s" font-weight="700">option</text>

  <rect x="1095" y="823" width="430" height="42" rx="9" fill="#ffffff" stroke="#1b5b8e" stroke-width="2"/>
  <text x="1310" y="850" text-anchor="middle" class="t s">ICE-FIG-010 | v0.1 | IN-REVIEW | 2026-07-16</text>
</svg>
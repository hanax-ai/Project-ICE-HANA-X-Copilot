<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">HANA-X Copilot procurement proof of value executive overview</title>
  <desc id="desc">Three procurement users state different intents. HANA-X Copilot assembles authorized context, applies policy, approval and compliance controls, resolves ambiguity, validates authority, invokes governed SAP S/4HANA tools, records an audit trail, and measures pilot outcomes without pre-declaring unverified results.</desc>
  <defs>
    <linearGradient id="banner" x1="0" x2="1"><stop offset="0" stop-color="#062a66"/><stop offset="0.68" stop-color="#00a6a6"/><stop offset="1" stop-color="#f3a34a"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#073b7a"/><stop offset="1" stop-color="#009a9c"/></linearGradient>
    <linearGradient id="soft" x1="0" x2="1"><stop offset="0" stop-color="#eff8ff"/><stop offset="1" stop-color="#f8efff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity="0.18"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#164e7a"/></marker>
    <style>
      .t{font-family:Arial,Helvetica,sans-serif;fill:#111827}.w{font-family:Arial,Helvetica,sans-serif;fill:white}.h1{font-size:42px;font-weight:700}.h2{font-size:27px;font-weight:700}.h3{font-size:21px;font-weight:700}.b{font-size:18px}.s{font-size:15px}.box{stroke:#1b5b8e;stroke-width:2.2}.arrow{stroke:#164e7a;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="45" y="56" class="t h1">HANA-X Copilot: Procurement Proof of Value — Executive Overview</text>
  <text x="47" y="92" class="t h2" font-weight="400">High-level governed intent-to-action pipeline</text>

  <rect x="190" y="112" width="1220" height="116" rx="18" fill="url(#banner)" stroke="#134f7d" stroke-width="3" filter="url(#shadow)"/>
  <text x="800" y="148" text-anchor="middle" class="w h2">Governed Intent-to-Action Pipeline</text>
  <rect x="335" y="164" width="1000" height="50" rx="12" fill="#ffffff" stroke="#7aa0d6" stroke-width="3"/>
  <text x="355" y="196" class="t b">Natural-language intent: “Secure material for production before the shortage affects the schedule.”</text>

  <text x="320" y="270" text-anchor="middle" class="t h2">1. Define Intent</text>
  <text x="800" y="270" text-anchor="middle" class="t h2">2. Context &amp; Governance</text>
  <text x="1310" y="270" text-anchor="middle" class="t h2">3. Measurable Outcomes</text>

  <rect x="180" y="290" width="1240" height="495" rx="18" fill="url(#soft)" stroke="#1b5b8e" stroke-width="3"/>
  <text x="805" y="328" text-anchor="middle" class="t h2">HANA-X COPILOT <tspan font-weight="400">(Enterprise Intent Layer)</tspan></text>
  <text x="1365" y="325" text-anchor="end" class="t s" font-style="italic">Clean Core-aligned execution</text>

  <g>
    <circle cx="235" cy="385" r="28" fill="#d9e6ff" stroke="#325c9b" stroke-width="2"/><text x="235" y="392" text-anchor="middle" class="t h3">A</text>
    <rect x="280" y="345" width="250" height="88" rx="12" fill="#ffffff" class="box"/>
    <text x="300" y="375" class="t b" font-weight="700">Draft purchase order</text>
    <text x="300" y="401" class="t s">Material X-100, Supplier Gamma</text>

    <circle cx="235" cy="500" r="28" fill="#d9e6ff" stroke="#325c9b" stroke-width="2"/><text x="235" y="507" text-anchor="middle" class="t h3">B</text>
    <rect x="280" y="460" width="250" height="88" rx="12" fill="#ffffff" class="box"/>
    <text x="300" y="490" class="t b" font-weight="700">Check stock availability</text>
    <text x="300" y="516" class="t s">Material Y-200 across plants</text>

    <circle cx="235" cy="615" r="28" fill="#d9e6ff" stroke="#325c9b" stroke-width="2"/><text x="235" y="622" text-anchor="middle" class="t h3">C</text>
    <rect x="280" y="575" width="250" height="88" rx="12" fill="#ffffff" class="box"/>
    <text x="300" y="605" class="t b" font-weight="700">Create urgent requisition</text>
    <text x="300" y="631" class="t s">Specialized tools for Project Alpha</text>
  </g>

  <rect x="565" y="350" width="330" height="155" rx="14" fill="url(#panel)" class="box" filter="url(#shadow)"/>
  <text x="730" y="388" text-anchor="middle" class="w h3">Active Controls</text>
  <text x="730" y="420" text-anchor="middle" class="w b">Identity • policy • approval</text>
  <text x="730" y="448" text-anchor="middle" class="w b">authority • compliance</text>
  <text x="730" y="478" text-anchor="middle" class="w s">The agent acts only within registered tools</text>

  <rect x="565" y="555" width="260" height="155" rx="14" fill="url(#panel)" class="box" filter="url(#shadow)"/>
  <text x="695" y="590" text-anchor="middle" class="w h3">Context Assembly</text>
  <text x="695" y="622" text-anchor="middle" class="w s">Contracts • supplier records</text>
  <text x="695" y="648" text-anchor="middle" class="w s">inventory • project budgets</text>
  <text x="695" y="674" text-anchor="middle" class="w s">organizational and SAP context</text>

  <rect x="865" y="555" width="260" height="155" rx="14" fill="#ffffff" class="box" filter="url(#shadow)"/>
  <text x="995" y="590" text-anchor="middle" class="t h3">Resolve &amp; Validate</text>
  <text x="995" y="622" text-anchor="middle" class="t s">Resolve ambiguity</text>
  <text x="995" y="648" text-anchor="middle" class="t s">Validate authority and budget</text>
  <text x="995" y="674" text-anchor="middle" class="t s">Create explainable execution plan</text>

  <rect x="1160" y="355" width="200" height="160" rx="14" fill="url(#panel)" class="box" filter="url(#shadow)"/>
  <text x="1260" y="398" text-anchor="middle" class="w h3">Governed SAP</text>
  <text x="1260" y="427" text-anchor="middle" class="w h3">S/4HANA Tools</text>
  <text x="1260" y="466" text-anchor="middle" class="w s">Released interface</text>
  <text x="1260" y="491" text-anchor="middle" class="w s">Authorized execution</text>

  <rect x="1390" y="335" width="170" height="210" rx="14" fill="#ffffff" stroke="#325c9b" stroke-width="3" filter="url(#shadow)"/>
  <text x="1475" y="371" text-anchor="middle" class="t h3">Audit Trail</text>
  <line x1="1412" y1="392" x2="1538" y2="392" stroke="#789" stroke-width="2"/>
  <text x="1420" y="421" class="t s">Intent ID</text><text x="1518" y="421" text-anchor="end" class="t s">Recorded</text>
  <text x="1420" y="449" class="t s">Approval</text><text x="1518" y="449" text-anchor="end" class="t s">Recorded</text>
  <text x="1420" y="477" class="t s">SAP result</text><text x="1518" y="477" text-anchor="end" class="t s">Recorded</text>
  <text x="1420" y="505" class="t s">Duration</text><text x="1518" y="505" text-anchor="end" class="t s">Measured</text>

  <rect x="1160" y="575" width="400" height="155" rx="14" fill="#f4f0ff" stroke="#6251a2" stroke-width="3" filter="url(#shadow)"/>
  <text x="1360" y="610" text-anchor="middle" class="t h3">Pilot Measures</text>
  <text x="1190" y="642" class="t b" font-weight="700">Task duration:</text><text x="1370" y="642" class="t b">baseline and target to be established</text>
  <text x="1190" y="672" class="t b" font-weight="700">Clarification effort:</text><text x="1390" y="672" class="t b">baseline and target to be established</text>
  <text x="1190" y="702" class="t b" font-weight="700">Control:</text><text x="1285" y="702" class="t b">approval, audit, and Clean Core evidence</text>

  <path d="M530 390 L555 390" class="arrow"/>
  <path d="M530 505 L555 505" class="arrow"/>
  <path d="M530 620 L555 620" class="arrow"/>
  <path d="M730 505 L730 545" class="arrow"/>
  <path d="M825 632 L855 632" class="arrow"/>
  <path d="M995 555 L995 520 L1145 520 L1145 435" class="arrow"/>
  <path d="M1360 435 L1380 435" class="arrow"/>
  <path d="M1475 545 L1475 565" class="arrow"/>

  <rect x="35" y="420" width="120" height="145" rx="14" fill="#f7fafc" stroke="#66788a" stroke-width="2"/>
  <text x="95" y="458" text-anchor="middle" class="t s" font-weight="700">Customer-</text>
  <text x="95" y="482" text-anchor="middle" class="t s" font-weight="700">controlled</text>
  <text x="95" y="506" text-anchor="middle" class="t s" font-weight="700">deployment</text>
  <text x="95" y="530" text-anchor="middle" class="t s" font-weight="700">option</text>

  <text x="210" y="825" class="t s">Illustrative proof-of-value workflow. Quantitative outcomes remain hypotheses until measured in a governed pilot.</text>
  <rect x="1095" y="823" width="430" height="42" rx="9" fill="#ffffff" stroke="#1b5b8e" stroke-width="2"/>
  <text x="1310" y="850" text-anchor="middle" class="t s">ICE-FIG-011 | v0.1 | IN-REVIEW | 2026-07-16</text>
</svg>